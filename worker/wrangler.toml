name = "lynch-screener-api"
main = "index.js"
compatibility_date = "2024-01-01"

# KV Namespace 바인딩 (주간 스냅샷 + 포트폴리오 저장)
# 아래 명령어로 생성:
#   wrangler kv namespace create LYNCH_DATA
# 생성 후 나오는 id를 아래에 입력하세요
[[kv_namespaces]]
binding = "LYNCH_DATA"
id = "988b9e91f07547f0979376ebd942049d"  # ← wrangler kv namespace create 후 나오는 ID로 교체

# 매주 일요일 09:00 UTC (한국 시간 월요일 새벽 6시) 자동 실행
[triggers]
crons = ["0 9 * * SUN"]
